services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: reqlens
      POSTGRES_PASSWORD: reqlens
      POSTGRES_DB: reqlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqlens -d reqlens"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/reqinone2
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    profiles:
      - full

volumes:
  pgdata:
  neo4jdata:
